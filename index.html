<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Merchant Watcher</title>
    <!-- 뷰포트 메타 태그 (모바일 반응형 필수) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- popup.css 하나만 사용합니다. -->
    <link rel="stylesheet" href="./popup.css" />
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-content">
          <h1 class="header-title" style="position: relative">
            <span id="currentServerName">아만</span>

            <div class="server-list" style="display: none; position: absolute">
              <div id="1">루페온</div>
              <div id="6">카마인</div>
              <div id="4">아브렐슈드</div>
              <div id="3">아만</div>
              <div id="5">카단</div>
              <div id="2">실리안</div>
              <div id="7">카제로스</div>
              <div id="8">니나브</div>
            </div>
          </h1>
        </div>

        <button id="btnRefresh" class="refresh-btn">
          <span class="refresh-text">갱신</span>
        </button>
      </div>
      <!-- 전설 카드 알림 토글 -->
      <div class="notify-toggle">
        <label for="toggleNotify">전설 카드 알림</label>
        <input id="toggleNotify" type="checkbox" />
      </div>
      <div class="time-section">
        <div id="currentTime"></div>
      </div>

      <div id="list" class="card-list"></div>
      <!-- 예시: 화면 중앙에 에러 메시지 표시 -->
      <div class="center-error" style="display: none" id="centerErrorMsg">
        에러가 발생했습니다.<br />잠시 후 다시 시도해주세요.
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
